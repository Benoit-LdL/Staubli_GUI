<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staübli GüI</title>
  
  <link rel="stylesheet" href="/static/style.css">
  
  <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon/favicon-16x16.png">
  <link rel="manifest" href="/static/site.webmanifest">
</head>
<body>

  <main id="viewport" aria-label="Robot 3D Viewport"></main>

  <aside id="panel">
    <section>
      <h2>Joint control</h2>
      <div id="joint-sliders">
        </div>
    </section>

    <section>
      <h2>Inverse kinematics</h2>
      <div class="ik-inputs">
        <input id="ik-x" type="number" step="0.01" value="0.3" aria-label="X coordinate">
        <input id="ik-y" type="number" step="0.01" value="0.0" aria-label="Y coordinate">
        <input id="ik-z" type="number" step="0.01" value="0.4" aria-label="Z coordinate">
      </div>
      <button class="btn" id="ik-btn" style="margin-top: 0.5rem;">Solve IK</button>
    </section>

    <section>
      <h2>End effector</h2>
      <div id="ee-pos">X: 0.30 | Y: 0.00 | Z: 0.40</div>
    </section>

    <section>
      <h2>Status</h2>
      <div id="status" class="disconnected">
        <span class="dot" aria-hidden="true"></span>
        <span class="status-text">Disconnected</span>
      </div>
    </section>

    <button class="btn secondary" id="home-btn">Reset to Home</button>
  </aside>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module" src="/static/viewer.js"></script>
  <script type="module" src="/static/controls.js"></script>
</body>
</html>
