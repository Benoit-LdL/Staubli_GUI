<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Robot Arm Controller</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: row;
      height: 100dvh;           /* dvh handles mobile browser chrome correctly */
      background: #1a1a2e;
      color: #eee;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }

    #viewport {
      flex: 1;
      position: relative;
      min-height: 0;            /* prevents flex overflow */
    }
    #viewport canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #panel {
      width: 280px;
      background: #16213e;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      border-left: 1px solid #0f3460;
      -webkit-overflow-scrolling: touch;
    }

    h2 {
      font-size: 14px;
      font-weight: 600;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .joint-row { display: flex; flex-direction: column; gap: 4px; }
    .joint-row label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #aaa;
    }
    .joint-row input[type=range] {
      width: 100%;
      accent-color: #e94560;
      height: 20px;             /* larger touch target on mobile */
    }

    #status {
      font-size: 11px;
      color: #aaa;
      padding: 8px;
      background: #0f3460;
      border-radius: 6px;
    }
    #status .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      margin-right: 6px;
    }
    #status.connected .dot { background: #4ade80; }

    #ee-pos { font-size: 11px; color: #aaa; }

    .btn {
      padding: 12px;            /* larger tap target */
      border: none;
      border-radius: 6px;
      background: #e94560;
      color: white;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      width: 100%;
    }
    .btn:hover { background: #c73652; }
    .btn:active { background: #a02a42; }
    .btn.secondary { background: #0f3460; }
    .btn.secondary:hover { background: #1a4a80; }

    .ik-inputs { display: flex; gap: 6px; }
    .ik-inputs input {
      flex: 1;
      padding: 8px 6px;
      background: #0f3460;
      border: 1px solid #334;
      border-radius: 4px;
      color: white;
      font-size: 12px;
      width: 0;
      min-height: 40px;        /* better touch target */
    }

    /* ── Mobile: stack viewport on top, panel below ── */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
        overflow: auto;          /* allow scrolling on mobile */
      }

      #viewport {
        width: 100%;
        height: 55dvh;           /* give most space to the 3D view */
        flex: none;
      }

      #panel {
        width: 100%;
        height: auto;
        border-left: none;
        border-top: 1px solid #0f3460;
        overflow-y: visible;     /* panel scrolls with the page */
        padding-bottom: 32px;    /* breathing room at bottom */
      }
    }
  </style>
</head>
<body>

<div id="viewport"></div>

<div id="panel">
  <h2>Joint control</h2>
  <div id="joint-sliders"></div>

  <h2>Inverse kinematics</h2>
  <div class="ik-inputs">
    <input id="ik-x" type="number" step="0.01" value="0.3" placeholder="X (m)">
    <input id="ik-y" type="number" step="0.01" value="0.0" placeholder="Y (m)">
    <input id="ik-z" type="number" step="0.01" value="0.4" placeholder="Z (m)">
  </div>
  <button class="btn" id="ik-btn">Solve IK</button>

  <h2>End effector</h2>
  <div id="ee-pos">–</div>

  <h2>Connection</h2>
  <div id="status"><span class="dot"></span>Disconnected</div>

  <button class="btn secondary" id="home-btn">Home position</button>
</div>


<!-- Three.js -->
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
  }
</script>

<script type="module" src="/static/viewer.js"></script>
<script type="module" src="/static/controls.js"></script>

</body>
</html>
