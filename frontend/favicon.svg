<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <circle cx="16" cy="16" r="15" fill="#0f3460"/>
  <!-- Base -->
  <rect x="12" y="24" width="8" height="4" rx="1" fill="#e94560"/>
  <!-- Link 1 vertical -->
  <rect x="14" y="16" width="4" height="9" rx="1" fill="#e94560"/>
  <!-- Joint 1 -->
  <circle cx="16" cy="17" r="3" fill="white"/>
  <!-- Link 2 angled -->
  <line x1="16" y1="17" x2="23" y2="10" stroke="#e94560" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Joint 2 -->
  <circle cx="23" cy="10" r="2.5" fill="white"/>
  <!-- Link 3 short -->
  <line x1="23" y1="10" x2="28" y2="8" stroke="#16213e" stroke-width="3" stroke-linecap="round"/>
  <!-- End effector -->
  <circle cx="28" cy="8" r="2" fill="#e94560"/>
</svg>